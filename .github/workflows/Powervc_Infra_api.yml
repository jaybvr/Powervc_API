name: Scheduled PowerVC Nosetests

on:
  schedule:
    - cron: '30 4,11 * * *' 
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: self-hosted
    steps:
      - name: Execute nosetests with HTML Plugin
        run: |
          # 1. MUST INSTALL ONCE ON RHEL: pip install nose-html-reporting
          
          export TEMPEST_CONFIG_DIR="/var/lib/jenkins/workspace/RTC_code_copy/"
          export TEMPEST_CONFIG="powervc-tempest/etc/powervc_jay.conf"
          export MAPPERS_CONFIG_DIR="/var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest/etc/"
          export MAPPERS_CONFIG="mappers.xml"
          
          cd /var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest
          
          # This generates a single, portable HTML file
          /usr/local/bin/nosetests \
            -s -d -v --with-xunit \
            powervc_tempest/tests/Regression/FVT/compute/test_trusted_profile.py \
            -a type=negative
          /usr/bin/python3.9 tools/reportgenerator_beta.py -i \
             /var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest/nosetest.xml
        continue-on-error: true

      - name: Upload Report to GitHub
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PowerVC-Test-Results 123
          path: /var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest/report.html
          retention-days: 14

      - name: Summary
        if: always()
        run: |
          echo "## PowerVC Report Ready 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Download 'PowerVC-Test-Results' from the Summary page to view the HTML report." >> $GITHUB_STEP_SUMMARY
