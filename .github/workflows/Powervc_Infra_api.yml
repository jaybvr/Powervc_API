name: Scheduled PowerVC Nosetests

on:
  schedule:
    - cron: '30 4,11 * * *' 
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute nosetests
        run: |
          export TEMPEST_CONFIG_DIR="/var/lib/jenkins/workspace/RTC_code_copy/"
          export TEMPEST_CONFIG="powervc-tempest/etc/powervc_jay.conf"
          export MAPPERS_CONFIG_DIR="/var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest/etc/"
          export MAPPERS_CONFIG="mappers.xml"
          
          cd /var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest
          
          /usr/local/bin/nosetests \
            --with-xunit --xunit-file=nosetests.xml \
            -s -d -v \
            powervc_tempest/tests/Regression/FVT/compute/test_trusted_profile.py \
            -a type=negative
        continue-on-error: true

      - name: Prep Allure Results
        if: always()
        run: |
          mkdir -p allure-results
          cp /var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest/nosetests.xml allure-results/

      # Fixed Inputs: changed allure_results -> report_dir and removed unsupported keys
      - name: Build Allure Report (JS Version)
        uses: mgrybyk-org/allure-report-branch-js-action@v1
        if: always()
        with:
          report_dir: allure-results
          gh_pages: gh-pages
          report_id: "powervc-report"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history # This is created by the action above
