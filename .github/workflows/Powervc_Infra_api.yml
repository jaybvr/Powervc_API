name: Scheduled PowerVC Nosetests

on:
  schedule:
    - cron: '30 4,11 * * *' # 10:00 AM & 05:00 PM IST (04:30 & 11:30 UTC)
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: self-hosted # Tells GitHub to use your Automation123 runner
    steps:
      - name: Execute nosetests directly on host
        run: |
          # 1. Set Environment Variables
          export TEMPEST_CONFIG_DIR="/var/lib/jenkins/workspace/RTC_code_copy/"
          export TEMPEST_CONFIG="powervc-tempest/etc/powervc_jay.conf"
          export MAPPERS_CONFIG_DIR="/var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest/etc/"
          export MAPPERS_CONFIG="mappers.xml"
          
          # 2. Change Directory
          cd /var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest
          
          # 3. Execute with specific binary and flags
          /usr/local/bin/nosetests \
            --with-xunit \
            -s -d -v \
            powervc_tempest/tests/Regression/FVT/compute/test_trusted_profile.py \
            --debug=show \
            -a type=negative
      - name: Generate Summary
        run: |
          echo "## PowerVC API Execution Report 🚀" >> $GITHUB_STEP_SUMMARY
          echo "The Execution was successful!" >> $GITHUB_STEP_SUMMARY  
      - name: Test Summary
        uses: test-summary/action@v2
        with:
          paths: "/var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest/powervc_tempest/nosetests.xml" # Adjust path to match your workspace
        if: always() # Ensures the report shows even if tests fail


          
