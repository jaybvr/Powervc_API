name: Scheduled PowerVC Nosetests

on:
  schedule:
    - cron: '30 4,11 * * *' 
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: self-hosted
    steps:
      - name: Execute nosetests with HTML Plugin
        run: |
          # 1. Ensure the HTML reporting plugin is installed on the host
          # pip install nose-html-reporting 

          export TEMPEST_CONFIG_DIR="/var/lib/jenkins/workspace/RTC_code_copy/"
          export TEMPEST_CONFIG="powervc-tempest/etc/powervc_jay.conf"
          export MAPPERS_CONFIG_DIR="/var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest/etc/"
          export MAPPERS_CONFIG="mappers.xml"
          
          cd /var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest
          
          # Generate both XML (for history) and HTML (for beauty)
          /usr/local/bin/nosetests \
            --with-xunit --xunit-file=nosetests.xml \
            --with-html --html-file=beautiful_report.html \
            -s -d -v \
            powervc_tempest/tests/Regression/FVT/compute/test_trusted_profile.py \
            --debug=show \
            -a type=negative
        continue-on-error: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: nose-results
          path: /var/lib/jenkins/workspace/RTC_code_copy/powervc-tempest/nosetests.xml
        if: always()
